<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <script type="text/javascript" charset="utf-8" src="js/main.js"></script>
    <link rel="shortcut icon" href="img/logo.png">
    <link rel="stylesheet" type="text/css" href="css/main.css"/>
    <title>起始页</title>
</head>
<body>
    <style type="text/css">
        ::-webkit-input-placeholder { color:rgba(255,255,255,0.8); }
        ::-moz-placeholder { color:rgba(255,255,255,0.8); }
        :-ms-input-placeholder { color:rgba(255,255,255,0.8); }
        input:-moz-placeholder { color:rgba(255,255,255,0.8); }
    </style>

    <div class="main">
        <p class="biaoti" id="biaoti">找点什么呢...</p>
        <div class="search">
            <div style="display: flex">
                <input type="input" id="input_search" placeholder="输入点什么吧..." 
                       class="search_input" 
                       onfocus="inputGetFocus()" 
                       onblur="inputLoseFocus()" 
                       onkeydown="search2(event)"/>
                <button class="search_button" onclick="search()">搜索</button>
            </div>
        </div>

        <div class="buttons">
            <button class="button_daohang" onclick="window.open('https://weread.qq.com');"weread</button>
            <button class="button_daohang" onclick="window.open('https://github.com');">Github</button>
            <button class="button_daohang" onclick="window.open('https://www.52pojie.cn');">52pj</button>
            <button class="button_daohang" onclick="window.open('https://https://bbs.kafan.cn/');">kafan</button>
            <button class="button_daohang" onclick="window.open('https://mail.163.com');">163mail</button>
            <button class="button_daohang" onclick="window.open('https://tianqi.qq.com/index.htm');">Weather</button>
            <button class="button_daohang" onclick="window.open('https://book.300077.xyz');"book</button>
        </div>
    </div>

    <div class="slogan">
        <p id="slogan2" class="slogan2" onclick="loadYiYan()"></p>
    </div>

    <div class="bg" id="bg"></div>
</body>
</html>
